<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Abia teacher 💗</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(#ffd6e8,#fff5fa);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:35px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
text-align:center;
width:320px;
}

h1{
color:#ff5fa2;
}

input{
width:90%;
padding:12px;
border-radius:12px;
border:2px solid #ffc2d9;
font-size:18px;
margin-top:15px;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:#ff7eb6;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#ff5fa2;
}

#message{
margin-top:15px;
color:#ff4d6d;
font-weight:bold;
}
</style>

</head>

<body>

<div class="box">
<h1>🔒 Birthday Surprise</h1>

<p>Only Abia teacher can unlock this 💌</p>

<input id="password" type="password" placeholder="Enter Password">

<br>

<button onclick="checkPassword()">Unlock 💗</button>

<p id="message"></p>

</div>

<script>

function checkPassword(){

let password=document.getElementById("password").value;

if(password==="Abi Teacher"){
window.location.href="letter.html";
}
else{
document.getElementById("message").innerHTML="Wrong password 💗";
}

}

</script>

</body>
</html>
